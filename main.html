 <!DOCTYPE html>
<html>
<head>
  <title>First Non-Space Character</title>
</head>
<body>

  <h2>Find First Non-Space Character</h2>

  <input type="text" id="textInput" placeholder="Enter a string">
  <button onclick="checkFirstChar()">Find Character</button>

  <h3 id="result"></h3>

  <script>
    function firstChar(str) {
      for (let i = 0; i < str.length; i++) {
        if (str[i] !== ' ') {
          return str[i];
        }
      }
      return '';
    }

    function checkFirstChar() {
      let text = document.getElementById("textInput").value;
      let answer = firstChar(text);

      document.getElementById("result").innerText =
        "Result: '" + answer + "'";
    }
  </script>

</body>
</html>
